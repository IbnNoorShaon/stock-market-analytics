version: 2

models:
  - name: stg_stock_prices
    description: "Cleaned daily stock price data with calculated fields"
    columns:
      - name: symbol
        description: "Stock ticker symbol"
        tests:
          - not_null
      - name: date
        description: "Trading date"
        tests:
          - not_null
      - name: close_price
        description: "Closing price"
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
      - name: daily_return_pct
        description: "Daily return percentage"
      - name: price_direction
        description: "Direction of price movement (UP/DOWN/FLAT)"
        tests:
          - accepted_values:
              values: ['UP', 'DOWN', 'FLAT']

  - name: stg_stock_metadata
    description: "Cleaned stock metadata"
    columns:
      - name: symbol
        description: "Stock ticker symbol"
        tests:
          - not_null
          - unique
      - name: company_name
        description: "Company name"
      - name: sector
        description: "Industry sector"
